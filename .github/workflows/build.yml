name: Build EVA Bridge IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Downgrade project format (XcodeGen 2.x â†’ format 77, but Xcode 15 needs 56)
        run: |
          PBXPROJ="EVA-Bridge.xcodeproj/project.pbxproj"
          echo "Before:"
          grep "objectVersion" $PBXPROJ | head -1
          sed -i.bak 's/objectVersion = [0-9]*;/objectVersion = 56;/g' $PBXPROJ
          echo "After:"
          grep "objectVersion" $PBXPROJ | head -1
          rm $PBXPROJ.bak

      - name: Build unsigned
        run: |
          set -o pipefail
          xcodebuild \
            -project EVA-Bridge.xcodeproj \
            -scheme EVA-Bridge \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/ \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee build.log
        continue-on-error: true

      - name: Show last 80 lines of build log
        if: always()
        run: |
          if [ -f build.log ]; then
            echo "=== last 80 lines of build log ==="
            tail -80 build.log
          fi

      - name: Find .app and package IPA (with Python zipfile)
        run: |
          set -e
          APP_PATH=$(find build -name "EVA-Bridge.app" -path "*Release-iphoneos*" 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found"
            find build -name "*.app" 2>/dev/null
            exit 1
          fi
          APP_PATH="$APP_PATH" python3 - <<'PY'
          import os, zipfile, shutil
          app_path = os.environ.get("APP_PATH")
          if not os.path.isdir(app_path):
              raise SystemExit("App not found")
          workspace = os.path.join(os.getcwd(), "_ipa_build")
          if os.path.isdir(workspace):
              shutil.rmtree(workspace)
          os.makedirs(workspace)
          payload = os.path.join(workspace, "Payload")
          os.makedirs(payload)
          target = os.path.join(payload, "EVA-Bridge.app")
          shutil.copytree(app_path, target)
          with zipfile.ZipFile("EVA-Bridge.ipa", "w", zipfile.ZIP_DEFLATED, compresslevel=9) as zf:
              for root, dirs, files in os.walk(payload):
                  for f in files:
                      full = os.path.join(root, f)
                      rel = os.path.relpath(full, workspace).replace(os.sep, "/")
                      zf.write(full, rel)
          size = os.path.getsize("EVA-Bridge.ipa")
          print(f"IPA built: {size} bytes")
          with open("EVA-Bridge.ipa", "rb") as f:
              head = f.read(4)
          if head[:2] != b"PK":
              raise SystemExit("Invalid magic bytes")
          print("Magic OK")
          shutil.rmtree(workspace)
          PY
          ls -la EVA-Bridge.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EVA-Bridge-unsigned
          path: EVA-Bridge.ipa
          if-no-files-found: error
          retention-days: 30
